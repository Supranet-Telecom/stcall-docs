name: Build & Deploy Docs

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build image and deploy
    runs-on: ubuntu-latest

    steps:
      # -------------------------------------------------------------------
      # 1. Checkout
      # -------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -------------------------------------------------------------------
      # 2. Docker Buildx (enables BuildKit cache + multi-platform if needed)
      # -------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -------------------------------------------------------------------
      # 3. Login to self-hosted registry
      # -------------------------------------------------------------------
      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      # -------------------------------------------------------------------
      # 4. Build & push
      #    Tags:  :latest  +  :<short-sha> for traceability
      # -------------------------------------------------------------------
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.production
          push: true
          tags: |
            ${{ secrets.REGISTRY_URL }}/stcall-docs:latest
            ${{ secrets.REGISTRY_URL }}/stcall-docs:${{ github.sha }}
          # GitHub Actions cache — dramatically speeds up repeated builds
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # -------------------------------------------------------------------
      # 5. Trigger Portainer stack redeploy via webhook
      # -------------------------------------------------------------------
      - name: Deploy via Portainer webhook
        run: |
          curl --fail --silent --show-error \
            -X POST "${{ secrets.PORTAINER_WEBHOOK_URL }}"
