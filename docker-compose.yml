services:
  docs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stcall-docs-dev
    ports:
      - "3001:3000"
    volumes:
      - .:/app
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: sh -c "bun install --force && rm -rf .nuxt .data && bun --bun run dev --host 0.0.0.0"
    stdin_open: true
    tty: true
